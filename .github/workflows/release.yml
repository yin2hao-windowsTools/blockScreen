name: Build release assets

on:
  push:
    tags:
      - 'v[0-9]*'

permissions:
  contents: write

jobs:
  build:
    name: Build Windows EXE, MSI, and portable packages
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            6.0.x

      - name: Build release assets
        id: build
        shell: pwsh
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          ./scripts/build-release.ps1 -Tag $env:RELEASE_TAG

          $metadata = Get-Content artifacts/release-metadata.json -Raw | ConvertFrom-Json
          "numeric_version=$($metadata.numericVersion)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "package_version=$($metadata.packageVersion)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "is_prerelease=$($metadata.isPrerelease.ToString().ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Upload test build artifact
        if: steps.build.outputs.is_prerelease == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: A1ScreenShade-${{ steps.build.outputs.package_version }}-win-x64
          path: |
            artifacts/packages/*.exe
            artifacts/packages/*.msi
            artifacts/packages/*.zip
          if-no-files-found: error

      - name: Publish GitHub release
        if: steps.build.outputs.is_prerelease == 'false'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          $assets = Get-ChildItem artifacts/packages -File | Where-Object { $_.Extension -in '.exe', '.msi', '.zip' } | ForEach-Object { $_.FullName }
          gh release create $env:RELEASE_TAG $assets `
            --verify-tag `
            --title 'A1 Screen Shade ${{ steps.build.outputs.package_version }}' `
            --notes "Automated build for $env:RELEASE_TAG."
